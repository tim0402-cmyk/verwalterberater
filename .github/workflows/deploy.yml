name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # Trigger bei jedem Push auf main
  workflow_dispatch:   # Manueller Trigger über GitHub UI möglich

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # Erzeugt den /out Ordner mit allen statischen Dateien

      - name: Add CNAME for custom domain
        run: echo "verwalterberater.de" > out/CNAME

      - name: Add .nojekyll
        run: touch out/.nojekyll
        # Verhindert, dass GitHub Pages _next/-Ordner ignoriert

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
